version: "3.9"

# Local dev stack — no Fly.io required.
# Uses MinIO as a Tigris-compatible S3 backend.
#
# Usage:
#   docker compose up -d
#   open http://localhost:8081/docs       — coordinator Swagger UI
#   open frontend/index.html             — UI (set coord URL to http://localhost:8081)
#
# MinIO console: http://localhost:9001  (minioadmin / minioadmin)

services:

  # ── MinIO (S3-compatible, replaces Tigris locally) ────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket init ──────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/duckpond-data &&
        echo 'Bucket ready.'
      "

  # ── Worker ────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
    ports:
      - "8080:8080"
    environment:
      AWS_ENDPOINT_URL_S3:  http://minio:9000
      AWS_ACCESS_KEY_ID:    minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION:           us-east-1
      BUCKET_NAME:          duckpond-data
      CATALOG_S3_KEY:       catalog/frozen.ddb
    depends_on:
      minio-init:
        condition: service_completed_successfully
    restart: on-failure

  # ── Coordinator ───────────────────────────────────────────────────────────
  coordinator:
    build:
      context: ./coordinator
    ports:
      - "8081:8081"
    environment:
      AWS_ENDPOINT_URL_S3:  http://minio:9000
      AWS_ACCESS_KEY_ID:    minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION:           us-east-1
      BUCKET_NAME:          duckpond-data
      # Leave WORKER_FLY_HOST empty → LOCAL mode (smallpond, no Fly workers)
      WORKER_FLY_HOST:      ""
      WORKER_COUNT:         "2"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    restart: on-failure

volumes:
  minio_data:
